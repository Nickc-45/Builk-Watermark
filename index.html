<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Bulk Watermarker</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip for packaging files for mobile -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <div class="container mx-auto p-4 max-w-6xl">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Bulk Watermarker <span class="text-xs bg-green-100 text-green-800 py-1 px-2 rounded-full align-middle ml-2">Mobile / WebP</span></h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- CONTROLS PANEL -->
            <div class="bg-white p-5 rounded-lg shadow-md lg:col-span-1 space-y-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Upload Images</label>
                    <input type="file" id="imageInput" multiple accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    <p id="fileCount" class="text-xs text-gray-500 mt-1">0 files selected</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pre-made Presets</label>
                    <select id="presetSelect" class="w-full border-gray-300 border rounded-md p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                        <option value="custom">-- Custom --</option>
                        <option value="copyright">Subtle Copyright (Bottom Right)</option>
                        <option value="draft">Red Diagonal DRAFT (Center)</option>
                        <option value="tiled">Tiled / Repeated Pattern</option>
                    </select>
                </div>

                <hr class="my-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Watermark Text</label>
                    <input type="text" id="watermarkText" value="© MyBrand 2024" class="w-full border-gray-300 border rounded-md p-2 text-sm">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
                        <input type="color" id="textColor" value="#ffffff" class="w-full h-10 border-0 rounded-md cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Opacity (<span id="opacityVal">50</span>%)</label>
                        <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.5" class="w-full mt-2">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Size (px)</label>
                        <input type="number" id="textSize" value="40" class="w-full border-gray-300 border rounded-md p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Position</label>
                        <select id="position" class="w-full border-gray-300 border rounded-md p-2 text-sm">
                            <option value="bottom-right">Bottom Right</option>
                            <option value="bottom-left">Bottom Left</option>
                            <option value="center">Center</option>
                            <option value="top-left">Top Left</option>
                            <option value="top-right">Top Right</option>
                            <option value="tiled">Repeated (Tiled)</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4">
                    <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-200 disabled:bg-gray-400" disabled>
                        Process & Save ZIP
                    </button>
                    <p id="statusText" class="text-xs text-gray-500 mt-2 text-center leading-tight">
                        Will prompt to choose save location.
                    </p>
                </div>
            </div>

            <!-- PREVIEW PANEL -->
            <div class="bg-white p-4 rounded-lg shadow-md lg:col-span-2 flex flex-col items-center justify-center min-h-[300px] lg:min-h-[400px]">
                <h2 class="text-lg font-semibold text-gray-700 mb-2 w-full text-left">Live Preview</h2>
                <div id="previewContainer" class="w-full h-full flex items-center justify-center border-2 border-dashed border-gray-300 bg-gray-50 overflow-hidden relative rounded-md">
                    <span id="placeholderText" class="text-gray-400 text-sm">Upload to preview</span>
                    <canvas id="previewCanvas" class="hidden max-w-full max-h-[400px] object-contain shadow-md"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const fileCount = document.getElementById('fileCount');
        const presetSelect = document.getElementById('presetSelect');
        const watermarkText = document.getElementById('watermarkText');
        const textColor = document.getElementById('textColor');
        const opacity = document.getElementById('opacity');
        const opacityVal = document.getElementById('opacityVal');
        const textSize = document.getElementById('textSize');
        const position = document.getElementById('position');
        const processBtn = document.getElementById('processBtn');
        const previewCanvas = document.getElementById('previewCanvas');
        const placeholderText = document.getElementById('placeholderText');
        const statusText = document.getElementById('statusText');

        let uploadedFiles = [];
        let firstImageObj = null;

        const presets = {
            copyright: { text: '© MyBrand 2024', color: '#ffffff', opacity: '0.5', size: '40', position: 'bottom-right' },
            draft: { text: 'DRAFT', color: '#ff0000', opacity: '0.3', size: '120', position: 'center' },
            tiled: { text: 'DO NOT COPY', color: '#000000', opacity: '0.2', size: '30', position: 'tiled' }
        };

        const inputs = [watermarkText, textColor, opacity, textSize, position];
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                presetSelect.value = 'custom';
                updatePreview();
                if(input === opacity) opacityVal.innerText = Math.round(input.value * 100);
            });
        });

        presetSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (presets[val]) {
                watermarkText.value = presets[val].text;
                textColor.value = presets[val].color;
                opacity.value = presets[val].opacity;
                opacityVal.innerText = Math.round(presets[val].opacity * 100);
                textSize.value = presets[val].size;
                position.value = presets[val].position;
                updatePreview();
            }
        });

        imageInput.addEventListener('change', (e) => {
            uploadedFiles = Array.from(e.target.files);
            fileCount.innerText = `${uploadedFiles.length} file(s) selected`;
            
            if (uploadedFiles.length > 0) {
                processBtn.disabled = false;
                placeholderText.classList.add('hidden');
                previewCanvas.classList.remove('hidden');
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        firstImageObj = img;
                        updatePreview();
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(uploadedFiles[0]);
            } else {
                processBtn.disabled = true;
                placeholderText.classList.remove('hidden');
                previewCanvas.classList.add('hidden');
            }
        });

        function drawWatermark(canvasObj, imgObj) {
            const context = canvasObj.getContext('2d');
            canvasObj.width = imgObj.width;
            canvasObj.height = imgObj.height;

            context.drawImage(imgObj, 0, 0);

            const text = watermarkText.value;
            const size = parseInt(textSize.value);
            const pos = position.value;
            
            context.globalAlpha = parseFloat(opacity.value);
            context.fillStyle = textColor.value;
            context.font = `bold ${size}px Arial, sans-serif`;
            
            context.shadowColor = "rgba(0,0,0,0.5)";
            context.shadowOffsetX = 2;
            context.shadowOffsetY = 2;
            context.shadowBlur = 4;

            const padding = Math.max(10, canvasObj.width * 0.02); // Dynamic padding for mobile screens

            if (pos === 'tiled') {
                context.translate(canvasObj.width/2, canvasObj.height/2);
                context.rotate(-Math.PI / 4);
                context.translate(-canvasObj.width/2, -canvasObj.height/2);

                const diagonalLength = Math.sqrt(canvasObj.width**2 + canvasObj.height**2);
                const stepX = context.measureText(text).width + 50;
                const stepY = size * 3;

                for (let x = -diagonalLength; x < diagonalLength * 2; x += stepX) {
                    for (let y = -diagonalLength; y < diagonalLength * 2; y += stepY) {
                        context.fillText(text, x, y);
                    }
                }
            } else {
                let x, y;
                context.textBaseline = 'top';
                const textWidth = context.measureText(text).width;

                switch (pos) {
                    case 'top-left': x = padding; y = padding; break;
                    case 'top-right': x = canvasObj.width - textWidth - padding; y = padding; break;
                    case 'bottom-left': x = padding; y = canvasObj.height - size - padding; break;
                    case 'bottom-right': x = canvasObj.width - textWidth - padding; y = canvasObj.height - size - padding; break;
                    case 'center': x = (canvasObj.width - textWidth) / 2; y = (canvasObj.height - size) / 2; break;
                }
                context.fillText(text, x, y);
            }
        }

        function updatePreview() {
            if (!firstImageObj) return;
            drawWatermark(previewCanvas, firstImageObj);
        }

        // --- MOBILE FRIENDLY ZIP GENERATION & CUSTOM LOCATION SAVING ---
        processBtn.addEventListener('click', async () => {
            if (uploadedFiles.length === 0) return;
            
            processBtn.disabled = true;
            statusText.innerText = "Converting images to WebP...";
            
            const zip = new JSZip();
            const imgFolder = zip.folder("Watermarked_WebP");
            const offScreenCanvas = document.createElement('canvas');

            for (let i = 0; i < uploadedFiles.length; i++) {
                const file = uploadedFiles[i];
                processBtn.innerText = `Processing ${i + 1}/${uploadedFiles.length}`;

                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            drawWatermark(offScreenCanvas, img);
                            
                            // WebP Format & Size logic (50% or 60%)
                            const mimeType = 'image/webp';
                            let quality = (file.size > 2 * 1024 * 1024) ? 0.5 : 0.6;

                            let cleanName = file.name.replace(/[^a-zA-Z0-9_\-\.]/g, '_');
                            let baseName = cleanName.substring(0, cleanName.lastIndexOf('.')) || cleanName;
                            let safeFileName = `${baseName}_watermarked.webp`;

                            offScreenCanvas.toBlob((blob) => {
                                if (blob) {
                                    imgFolder.file(safeFileName, blob);
                                }
                                resolve();
                            }, mimeType, quality);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }

            processBtn.innerText = "Generating ZIP...";
            
            // Generate the ZIP file
            const zipBlob = await zip.generateAsync({
                type: "blob",
                compression: "DEFLATE",
                compressionOptions: { level: 6 }
            });

            processBtn.innerText = "Waiting for Save Location...";

            // --- SAVE FILE LOGIC (CUSTOM LOCATION SUPPORT) ---
            try {
                // Try modern File System Access API first (Best for custom locations)
                if (window.showSaveFilePicker) {
                    const fileHandle = await window.showSaveFilePicker({
                        suggestedName: 'Watermarked_Images.zip',
                        types: [{
                            description: 'ZIP Archive',
                            accept: {'application/zip': ['.zip']}
                        }]
                    });
                    const writable = await fileHandle.createWritable();
                    await writable.write(zipBlob);
                    await writable.close();
                    statusText.innerText = "Saved successfully!";
                } else {
                    // Fallback for Mobile WebViews (Triggers native download manager)
                    const url = URL.createObjectURL(zipBlob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'Watermarked_Images.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    statusText.innerText = "Download triggered!";
                }
            } catch (err) {
                // If user cancels the save dialog, catch the error so the app doesn't break
                console.warn("Save cancelled or failed:", err);
                statusText.innerText = "Save cancelled.";
            }

            // Reset UI
            setTimeout(() => {
                processBtn.innerText = "Process & Save ZIP";
                processBtn.disabled = false;
                statusText.innerText = "Will prompt to choose save location.";
            }, 3000);
        });
    </script>
</body>
</html>
